# Local development infrastructure for the Equipment Additional Information Tool.
#
# NOTE: This project's database intentionally uses host port 5544 so it does NOT
# collide with any other Postgres already running on this machine (e.g. an
# existing CMMS on 5433). Only the database is defined here for local dev; the
# backend and frontend run on the host during development.
#
# NOTE: The Compose project name is pinned to "equipment-additional-info" so it
# stays stable regardless of the folder name (the directory was renamed to
# "tagspec" for branding). Without this pin, Compose would derive the project
# name from the new folder and look for a different volume, silently creating a
# new empty database. Pinning it keeps the existing container (eai_database) and
# data volume (equipment-additional-info_eai_pgdata). This is an internal
# infrastructure identifier only; the product is branded "TagSpec".
name: equipment-additional-info

services:
  database:
    image: postgres:16
    container_name: eai_database
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-equipment_addl_info}
      POSTGRES_USER: ${POSTGRES_USER:-eai_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local_only}
    ports:
      - "${POSTGRES_PORT:-5544}:5432"
    volumes:
      - eai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eai_app} -d ${POSTGRES_DB:-equipment_addl_info}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  eai_pgdata:
