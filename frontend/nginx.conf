# Serves the built SPA and proxies API/health calls to the backend container.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow workbook uploads (backend cap is 25 MB; leave headroom).
    client_max_body_size 30m;

    # Resolve "backend" at request time (Docker's embedded DNS) instead of once
    # at nginx startup. A static proxy_pass hostname is resolved only when nginx
    # boots; if the backend container isn't up yet (e.g. a race after a full
    # Docker restart, where restart policies don't honor depends_on ordering),
    # nginx fails to start entirely with "host not found in upstream". Using a
    # variable defers resolution to each request so nginx starts regardless.
    resolver 127.0.0.11 valid=10s;

    # Reverse-proxy the API to the backend service on the compose network.
    location /api/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream/health;
    }

    # SPA fallback: let client-side routing handle unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
